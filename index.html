<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almond Eyes</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Background -->
    <div class="background"></div>

    <!-- Floating Particles -->
    <div id="particles"></div>

    <!-- Hero -->
    <main class="hero">

        <div class="glass-card">

            <span class="small-text">
                Made with love, only for you.
            </span>

            <h1 id="title">
                Almond Eyes
            </h1>

            <p class="subtitle">
                Some stories deserve their own universe.
            </p>

            <div class="divider"></div>

            <!-- Countdown -->
            <div class="countdown">

                <div class="time-box">
                    <span id="days">00</span>
                    <small>Days</small>
                </div>

                <div class="time-box">
                    <span id="hours">00</span>
                    <small>Hours</small>
                </div>

                <div class="time-box">
                    <span id="minutes">00</span>
                    <small>Minutes</small>
                </div>

                <div class="time-box">
                    <span id="seconds">00</span>
                    <small>Seconds</small>
                </div>

            </div>

            <button id="enterBtn">
                Begin the Journey
            </button>

            <div id="lockMessage" class="hidden">

                <h3>🔒 Locked</h3>

                <p>
                    Your journey begins on
                </p>

                <h2>
                    27th
                </h2>

                <p>
                    Every second brings us closer to something beautiful...
                </p>

            </div>

        </div>

    </main>

    <!-- Footer -->
    <footer>

        <span class="footer-text">
            Made with love.
        </span>

    </footer>

    <script src="script.js"></script>

</body>

</html>
<link rel="stylesheet" href="style.css">
<script src="script.js"></script>
